name: CI

on:
  pull_request:
    branches: [main, rc, '*-RC']
  push:
    branches: [main, rc]

jobs:
  lint-and-format:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm ci
      - run: npm run build:prompts
      - run: npx prettier --check .
      - run: npx eslint src/
      - run: npm run lint # TypeScript type checking

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm ci
      - run: npm run build:prompts
      - run: npm run test

  e2e:
    runs-on: ubuntu-latest
    needs: [test]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - run: npm run build
      - name: Run E2E tests
        run: xvfb-run --auto-servernum npx playwright test
        env:
          CI: true
          ELECTRON_DISABLE_GPU: '1'
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: e2e-results
          path: e2e-results/
